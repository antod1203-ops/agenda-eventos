name: Actualizador de Eventos

on:
  workflow_dispatch: # Esto permite la ejecución manual

jobs:
  ejecutar-extractor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: pip install requests

    - name: Ejecutar Extractor
      run: python script.py

    - name: Guardar cambios en GitHub
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'actions@github.com'
        git add eventos.json
        git diff-index --quiet HEAD || git commit -m "JSON actualizado automáticamente"
        git push
