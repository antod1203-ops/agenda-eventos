name: Actualizador de Eventos para Blogger

on:
  schedule:
    - cron: '*/30 * * * *' # Se ejecuta automáticamente cada 30 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

permissions:
  contents: write # Da permiso a GitHub para guardar el archivo modificado

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: pip install requests

    - name: Ejecutar script extractor
      run: python "script - copia.py"

    - name: Guardar cambios y subirlos a GitHub
      run: |
        git config --global user.name 'Blogger Bot'
        git config --global user.email 'bot@github.com'
        git add eventos_organizados.json
        git commit -m "Eventos actualizados automáticamente" || exit 0
        git push
