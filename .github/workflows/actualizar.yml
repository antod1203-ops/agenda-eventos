name: Actualizador de Eventos para Blogger

on:
  schedule:
    - cron: '*/5 * * * *' # Sigue a 5 minutos para las pruebas rápidas
  workflow_dispatch: # Botón manual por si acaso

permissions:
  contents: write # Permiso para escribir cambios

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: pip install requests

    - name: Ejecutar script extractor
      run: |
        mkdir -p docs
        python "script - copia.py"
        if [ -f "eventos_organizados.json" ]; then
          mv eventos_organizados.json docs/
        fi

    - name: Guardar cambios y subirlos a GitHub
      run: |
        git config --global user.name 'Blogger Bot'
        git config --global user.email 'bot@github.com'
        
        if [ -f "docs/eventos_organizados.json" ]; then
          git add docs/eventos_organizados.json
          
          # FORZAMOS EL PUSH DIRECTAMENTE A ORIGIN MAIN
          git commit -m "Eventos actualizados automáticamente (Cada 5 min)" && git push origin main || echo "No hay cambios nuevos en los eventos"
        else
          echo "ERROR: El script no generó el archivo esperado en docs/eventos_organizados.json"
          exit 1
        fi
