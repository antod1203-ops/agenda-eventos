name: Actualizador de Eventos para Blogger

on:
  schedule:
    - cron: '*/5 * * * *' # ¡ACELERADO! Se ejecuta automáticamente cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente con el botón si tienes prisa

permissions:
  contents: write # Permiso explícito para escribir cambios en el repositorio

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4 # Evita advertencias de Node.js antiguas

    - name: Configurar Python
      uses: actions/setup-python@v5 # Evita advertencias de Node.js antiguas
      with:
        python-version: '3.10'

    - name: Instalar librerías necesarias
      run: pip install requests

    - name: Ejecutar script extractor
      run: |
        mkdir -p docs
        python "script - copia.py"
        # Si el script genera el archivo en la raíz, lo movemos a docs para GitHub Pages
        if [ -f "eventos_organizados.json" ]; then
          mv eventos_organizados.json docs/
        fi

    - name: Guardar cambios y subirlos a GitHub
      run: |
        git config --global user.name 'Blogger Bot'
        git config --global user.email 'bot@github.com'
        
        # Comprobamos que el archivo exista en docs/ antes de guardarlo
        if [ -f "docs/eventos_organizados.json" ]; then
          git add docs/eventos_organizados.json
          
          # Intentamos hacer commit y push directamente a la rama principal detectada
          git commit -m "Eventos actualizados automáticamente (Cada 5 min)" && git push || echo "No hay cambios nuevos en los eventos"
        else
          echo "ERROR: El script no generó el archivo esperado en docs/eventos_organizados.json"
          exit 1
        fi
